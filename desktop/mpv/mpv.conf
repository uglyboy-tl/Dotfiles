########
# 基础 #
########

## 解码
vo=gpu-next
gpu-api=auto
hwdec=auto-copy
hwdec-codecs=h264,hevc,vp9,vc1,mpeg2video,mpeg4

########
# 画质 #
########

## 平滑插帧
interpolation=yes
tscale=oversample
video-sync=display-resample

## Deband (消除色带，低码率视频效果明显)
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=16
deband-grain=4

## HDR 映射
tone-mapping=bt.2446a

########
# 功能 #
########

title=${?pause==yes:⏸}${?mute==yes:🔇}${?ontop==yes:📌}${?demuxer-via-network==yes:${media-title}}${?demuxer-via-network==no:${filename}}
osd-bar=no
border=no
input-ime=no
autofit-smaller=40%x30%
autofit-larger=80%x80%
keep-open=yes
autoload-enabled=yes
save-position-on-quit=yes
resume-playback-check-mtime=yes
hr-seek=yes

########
# 缓存 #
########

demuxer-max-bytes=500MiB
demuxer-max-back-bytes=150MiB

# 截图
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-tag-colorspace=yes

# 音量上限（有些视频音量太低）
volume-max=150

##########
# 字幕 ##
##########

sub-auto=fuzzy
sub-file-paths-append=sub
sub-file-paths-append=subs
sub-file-paths-append=subtitles

##########
# 音频 ##
##########

audio-file-auto=fuzzy
audio-file-paths=audio

########
# IPC ##
########

input-ipc-server=/tmp/mpvsocket