# vim: ft=cfg
#
# Dunst 通知管理器配置文件 - 优化精简版
#

[global]
	# 显示设置
	follow = mouse
	idle_threshold = 120

	# 几何设置
	width = 325
	height = (0, 120)

	# 外观设置
	transparency = 10
	padding = 18
	horizontal_padding = 16
	frame_width = 3
	frame_color = "#2E3440"
	corner_radius = 6

	# 文本设置
	font = Maple Mono SC NF 12
	line_height = 4
	format = "%s\n%b"

	# 图标设置 - 使用 Adwaita symbolic 图标
	icon_path = /usr/share/icons/Adwaita/symbolic/status/:/usr/share/icons/Adwaita/scalable/status/:/usr/share/icons/Adwaita/symbolic/devices/
	max_icon_size = 64

	# 启用堆叠重复通知（避免重复通知堆积）
	stack_duplicates = true

	# 圆角设置
	corners = all

	# 应用集成
	dmenu = /usr/bin/rofi -dmenu -p dunst:
	browser = /usr/bin/microsoft-edge -new-tab

# 紧急程度设置（增加视觉区分度）
[urgency_low]
	background = "#3B4252"
	foreground = "#D8DEE9"
	timeout = 3

[urgency_normal]
	background = "#2E3440"
	foreground = "#ECEFF4"
	timeout = 4

[urgency_critical]
	background = "#BF616A"
	foreground = "#ECEFF4"
	timeout = 0
