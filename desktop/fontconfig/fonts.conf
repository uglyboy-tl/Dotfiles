<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <!-- 基础字体渲染设置 -->
  <match target="font">
    <edit mode="assign" name="rgba">
      <const>rgb</const>
    </edit>
  </match>

  <match target="font">
    <edit mode="assign" name="hintstyle">
      <const>hintslight</const>
    </edit>
  </match>

  <match target="font">
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Sans-serif 字体族：DejaVu Sans → Sarasa UI SC → Noto Sans CJK SC -->
  <match target="pattern">
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>DejaVu Sans</string>
      <string>Sarasa UI SC</string>
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <!-- Serif 字体族：DejaVu Serif → LXGW WenKai → Noto Serif CJK SC -->
  <match target="pattern">
    <test name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>DejaVu Serif</string>
      <string>LXGW WenKai GB Screen</string>
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <!-- Monospace 字体族：Maple Mono → Hack → Sarasa Mono → Noto Sans Mono CJK SC -->
  <match target="pattern">
    <test name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Maple Mono SC NF</string>
      <string>Sarasa Mono SC</string>
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <!-- Emoji 字体优先级 -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Apple Color Emoji</family>
      <family>Noto Color Emoji</family>
      <family>Noto Emoji</family>
    </prefer>
  </alias>



</fontconfig>